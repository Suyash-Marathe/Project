<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Society Portal</title>
    <link rel="stylesheet" href="styles.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [userRole, setUserRole] = useState(null);
            const [loggedInUser, setLoggedInUser] = useState("");
            const [username, setUsername] = useState("");
            const [password, setPassword] = useState("");
            
            const [newResUser, setNewResUser] = useState("");
            const [newResPass, setNewResPass] = useState("");

            const [polls, setPolls] = useState([]);
            const [newQuestion, setNewQuestion] = useState("");
            const [opt1, setOpt1] = useState("");
            const [opt2, setOpt2] = useState("");
            const [opt3, setOpt3] = useState("");
            const [opt4, setOpt4] = useState("");
            const [commentText, setCommentText] = useState({});

            const fetchPolls = async () => {
                const res = await fetch('/api/polls');
                const data = await res.json();
                setPolls(data);
            };

            useEffect(() => {
                if (userRole) fetchPolls();
            }, [userRole]);

            const handleLogin = async (e) => {
                e.preventDefault();
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    setUserRole(data.role);
                    setLoggedInUser(data.username);
                } else {
                    alert("Invalid Username or Password");
                }
            };

            const handleLogout = () => {
                setUserRole(null);
                setLoggedInUser("");
                setUsername("");
                setPassword("");
            };

            const createResident = async (e) => {
                e.preventDefault();
                if (!newResUser || !newResPass) return;

                const res = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: newResUser, password: newResPass })
                });
                
                const data = await res.json();
                if (res.ok && data.success) {
                    alert(`Resident account created successfully`);
                    setNewResUser("");
                    setNewResPass("");
                } else {
                    alert(data.error || "Failed to create user");
                }
            };

            const createPoll = async (e) => {
                e.preventDefault();
                if(!newQuestion || !opt1 || !opt2) return;
                
                const optionsArray = [{ text: opt1 }, { text: opt2 }];
                if (opt3.trim() !== "") optionsArray.push({ text: opt3 });
                if (opt4.trim() !== "") optionsArray.push({ text: opt4 });

                await fetch('/api/polls', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: newQuestion, options: optionsArray, votedUsers: [] })
                });
                
                setNewQuestion(""); 
                setOpt1(""); 
                setOpt2(""); 
                setOpt3(""); 
                setOpt4("");
                fetchPolls();
            };

            const handleVote = async (pollId, optionIndex) => {
                const res = await fetch(`/api/polls/${pollId}/vote`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ optionIndex, user: loggedInUser })
                });
                
                const data = await res.json();
                if (!res.ok) {
                    alert(data.error || "Failed to register vote");
                }
                fetchPolls();
            };

            const handleComment = async (pollId) => {
                const text = commentText[pollId];
                if (!text) return;
                await fetch(`/api/polls/${pollId}/comment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user: loggedInUser, text })
                });
                setCommentText({ ...commentText, [pollId]: "" });
                fetchPolls();
            };

            const handleDelete = async (pollId) => {
                if (!window.confirm("Are you sure you want to delete this poll?")) return;
                await fetch(`/api/polls/${pollId}`, {
                    method: 'DELETE'
                });
                fetchPolls();
            };

            if (!userRole) {
                return (
                    <div className="login-container">
                        <div className="login-box">
                            <h2>Society Portal</h2>
                            <form onSubmit={handleLogin}>
                                <div className="form-group">
                                    <label>Username</label>
                                    <input type="text" value={username} onChange={e => setUsername(e.target.value)} required />
                                </div>
                                <div className="form-group">
                                    <label>Password</label>
                                    <input type="password" value={password} onChange={e => setPassword(e.target.value)} required />
                                </div>
                                <button type="submit" className="btn btn-primary">Secure Login</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="app-container">
                    <header className="main-header">
                        <div className="header-brand">
                            <h1>{userRole === 'admin' ? 'Administration Dashboard' : `Resident Portal - ${loggedInUser}`}</h1>
                        </div>
                        <button onClick={handleLogout} className="btn btn-danger btn-sm">Sign Out</button>
                    </header>

                    <main className="main-content">
                        {userRole === 'admin' && (
                            <div className="admin-grid">
                                <section className="panel">
                                    <div className="panel-header-decor panel-poll-decor"></div>
                                    <h3 className="panel-title">Publish New Poll</h3>
                                    <form onSubmit={createPoll} className="inline-form">
                                        <div className="form-group">
                                            <label>Poll Question</label>
                                            <input type="text" placeholder="What would you like to ask?" value={newQuestion} onChange={e => setNewQuestion(e.target.value)} required />
                                        </div>
                                        <div className="input-grid">
                                            <div className="form-group">
                                                <label>Option A (Required)</label>
                                                <input type="text" value={opt1} onChange={e => setOpt1(e.target.value)} required />
                                            </div>
                                            <div className="form-group">
                                                <label>Option B (Required)</label>
                                                <input type="text" value={opt2} onChange={e => setOpt2(e.target.value)} required />
                                            </div>
                                            <div className="form-group">
                                                <label>Option C (Optional)</label>
                                                <input type="text" value={opt3} onChange={e => setOpt3(e.target.value)} />
                                            </div>
                                            <div className="form-group">
                                                <label>Option D (Optional)</label>
                                                <input type="text" value={opt4} onChange={e => setOpt4(e.target.value)} />
                                            </div>
                                        </div>
                                        <button type="submit" className="btn btn-success">Publish Poll</button>
                                    </form>
                                </section>

                                <section className="panel">
                                    <div className="panel-header-decor panel-user-decor"></div>
                                    <h3 className="panel-title">Register Resident</h3>
                                    <form onSubmit={createResident} className="inline-form">
                                        <div className="form-group">
                                            <label>Username</label>
                                            <input type="text" placeholder="New Resident Username" value={newResUser} onChange={e => setNewResUser(e.target.value)} autoComplete="off" required />
                                        </div>
                                        <div className="form-group">
                                            <label>Password</label>
                                            <input type="password" placeholder="Assign Password" value={newResPass} onChange={e => setNewResPass(e.target.value)} autoComplete="new-password" required />
                                        </div>
                                        <button type="submit" className="btn btn-secondary">Create Account</button>
                                    </form>
                                </section>
                            </div>
                        )}

                        <section className="feed-section">
                            <h3 className="section-title">Active Community Discussions</h3>
                            <div className="polls-grid">
                                {polls.length === 0 ? <div className="text-muted panel">No polls currently active. Check back later.</div> : null}
                                {polls.map(poll => {
                                    const hasVoted = poll.votedUsers && poll.votedUsers.includes(loggedInUser);
                                    
                                    return (
                                        <div key={poll._id} className="card poll-card panel">
                                            <div className="poll-header">
                                                <h4 className="poll-question">{poll.question}</h4>
                                                {userRole === 'admin' && (
                                                    <button onClick={() => handleDelete(poll._id)} className="btn btn-danger btn-sm">Remove</button>
                                                )}
                                            </div>
                                            
                                            <div className="poll-body">
                                                {hasVoted && userRole === 'people' && (
                                                    <div className="alert alert-success">Your vote has been successfully recorded.</div>
                                                )}
                                                <div className="options-list">
                                                    {poll.options.map((opt, index) => (
                                                        <div key={index} className="option-row">
                                                            <div className="option-action">
                                                                {userRole === 'people' && !hasVoted ? (
                                                                    <button onClick={() => handleVote(poll._id, index)} className="btn btn-vote btn-sm">Vote Here</button>
                                                                ) : (
                                                                    <span className="admin-opt">{opt.text}</span>
                                                                )}
                                                            </div>
                                                            <div className="vote-badge">
                                                                <span className="vote-count">{opt.votes}</span>
                                                                <span className="vote-label">Votes</span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className="poll-footer">
                                                <h5 className="comments-heading">Resident Feedback</h5>
                                                <div className="comments-wrapper">
                                                    {poll.comments.map((c, i) => (
                                                        <div key={i} className="comment-item">
                                                            <span className="comment-avatar">{c.user.charAt(0).toUpperCase()}</span>
                                                            <div className="comment-content-box">
                                                                <span className="comment-author">{c.user}</span>
                                                                <span className="comment-content">{c.text}</span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                                {userRole === 'people' && (
                                                    <div className="comment-form">
                                                        <input type="text" className="form-control" placeholder="Add your response" value={commentText[poll._id] || ""} onChange={e => setCommentText({...commentText, [poll._id]: e.target.value})} />
                                                        <button onClick={() => handleComment(poll._id)} className="btn btn-primary btn-sm">Submit</button>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </section>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
